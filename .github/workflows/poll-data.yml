name: Poll data

concurrency:
  group: poll-data

# Requires these repository secrets:
# SMTP_HOST - SMTP host for outgoing mail
# SMTP_PORT - SMTP port for outgoing mail
# SMTP_USERNAME - SMTP username (optional)
# SMTP_PASSWORD - SMTP password (optional)
# SMTP_USE_STARTTLS - enable STARTTLS (true/false)
# SMTP_USE_SSL - use implicit SSL (true/false)
# MAIL_FROM_ADDRESS - sender address
# MAIL_TO_ADDRESSES - comma-separated recipient addresses
# GENESIS_LFSTAT_USERNAME - Genesis LfStat Bayern credentials
# GENESIS_LFSTAT_PASSWORD - Genesis LfStat Bayern credentials
# GITHUB_PAT - a personal access token with the repo scope

on:
  workflow_call:
    inputs:
      pollers:
        required: true
        type: string

jobs:
  poll-data:
    environment: vaterstetten-in-zahlen.de
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install APT requirements
        run: sudo apt update && sudo apt install -y libkrb5-dev
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pipenv
        run: pip install --ignore-installed pipenv==2024.4.0
      - name: Install python packages
        run: pipenv sync
      - name: Run python script
        run: pipenv run python tools/poll.py -p ${{ inputs.pollers }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_STARTTLS: ${{ secrets.SMTP_USE_STARTTLS }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_TO_ADDRESSES: ${{ secrets.MAIL_TO_ADDRESSES }}
          GENESIS_LFSTAT_USERNAME: ${{ secrets.GENESIS_LFSTAT_USERNAME }}
          GENESIS_LFSTAT_PASSWORD: ${{ secrets.GENESIS_LFSTAT_PASSWORD }}
        continue-on-error: true
        timeout-minutes: 10
      - name: Commit
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: automatic data update
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: GitHub Actions <actions@github.com>
      - if: steps.auto-commit-action.outputs.changes_detected == 'true'
        name: Trigger Deploy workflow
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Deploy
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
